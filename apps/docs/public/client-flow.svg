<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title" aria-describedby="desc">
  <title id="title">UCD client flow</title>
  <desc id="desc">Diagram showing discovery and explicit config flows for the UCD client and the well-known config and manifest requests.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 16; ry: 16; }
      .node { fill: #1f2937; stroke: #64748b; stroke-width: 2; rx: 12; ry: 12; }
      .accent { fill: #0f766e; stroke: #5eead4; }
      .text { fill: #e5e7eb; font: 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #cbd5e1; font: 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { fill: none; stroke: #94a3b8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      .title { fill: #f8fafc; font: 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 700; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="540" rx="24" ry="24"/>
  <text class="title" x="40" y="48">UCD client flow</text>

  <rect class="panel" x="32" y="72" width="420" height="420"/>
  <text class="text" x="56" y="106">Discovery flow</text>

  <rect class="node accent" x="56" y="128" width="180" height="56"/>
  <text class="text" x="78" y="163">createUCDClient(baseUrl)</text>

  <rect class="node" x="56" y="232" width="180" height="56"/>
  <text class="text" x="73" y="267">GET /.well-known/</text>
  <text class="text" x="74" y="286">ucd-config.json</text>

  <rect class="node" x="56" y="336" width="180" height="56"/>
  <text class="text" x="88" y="370">Validate</text>
  <text class="text" x="75" y="389">UCDWellKnownConfig</text>

  <rect class="node" x="264" y="232" width="160" height="72"/>
  <text class="text" x="292" y="265">Create files</text>
  <text class="text" x="284" y="286">and versions</text>
  <text class="text" x="300" y="307">resources</text>

  <path class="arrow" d="M146 184 L146 232"/>
  <path class="arrow" d="M146 288 L146 336"/>
  <path class="arrow" d="M236 364 C260 364 260 268 264 268"/>

  <rect class="node" x="264" y="352" width="160" height="56"/>
  <text class="text" x="288" y="387">client.files.get(path)</text>

  <rect class="node" x="264" y="424" width="160" height="56"/>
  <text class="small" x="289" y="455">client.versions.list()</text>
  <text class="small" x="277" y="474">/ getFileTree(version)</text>

  <path class="arrow" d="M344 304 L344 352"/>
  <path class="arrow" d="M344 304 L344 424"/>

  <rect class="panel" x="484" y="72" width="444" height="420"/>
  <text class="text" x="508" y="106">Explicit config and well-known helpers</text>

  <rect class="node accent" x="508" y="128" width="204" height="56"/>
  <text class="small" x="526" y="163">createUCDClientWithConfig</text>
  <text class="small" x="576" y="182">(baseUrl, config)</text>

  <rect class="node" x="744" y="128" width="160" height="56"/>
  <text class="text" x="780" y="163">Create same</text>
  <text class="text" x="773" y="182">resources</text>

  <path class="arrow" d="M712 156 L744 156"/>

  <rect class="node" x="508" y="256" width="180" height="56"/>
  <text class="text" x="542" y="291">client.config.get()</text>

  <rect class="node" x="724" y="240" width="180" height="72"/>
  <text class="text" x="742" y="274">GET /.well-known/</text>
  <text class="text" x="742" y="293">ucd-config.json</text>

  <path class="arrow" d="M688 284 L724 276"/>

  <rect class="node" x="508" y="368" width="204" height="56"/>
  <text class="small" x="527" y="403">client.manifest.get(version)</text>

  <rect class="node" x="724" y="352" width="180" height="72"/>
  <text class="text" x="739" y="386">GET /.well-known/</text>
  <text class="small" x="745" y="405">ucd-store/{version}.json</text>

  <path class="arrow" d="M712 396 L724 388"/>
</svg>
